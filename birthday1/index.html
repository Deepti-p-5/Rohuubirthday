<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Rohu Cutiee</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
overflow-x:hidden;
}

/* Title */

.title{
font-family:'Pacifico',cursive;
font-size:45px;
color:white;
margin-top:25px;
text-shadow:0 0 10px pink,0 0 20px red;
}

/* Birthday Wish Box */

.wishbox{
width:85%;
max-width:600px;
margin:25px auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px pink;
font-family:'Dancing Script',cursive;
font-size:26px;
font-style:italic;
color:#ff4d6d;
}

/* Photo Gallery */

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
width:200px;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 15px pink;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.quote{
padding:10px;
font-style:italic;
color:#ff4d6d;
}

/* Love Letter */

.letter{
background:white;
width:85%;
max-width:600px;
margin:30px auto;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px pink;
font-size:18px;
min-height:120px;
}

/* Button */

button{
padding:12px 25px;
border:none;
background:#ff4d6d;
color:white;
font-size:18px;
border-radius:25px;
cursor:pointer;
margin-bottom:40px;
}

/* Floating Hearts */

.heart{
position:fixed;
bottom:-10px;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

</style>

</head>

<body>

<div class="title">💖 Happy Birthday Rohu Cutiee 💖</div>

<div class="wishbox">
May your birthday be filled with love, laughter, and beautiful memories.  
You deserve all the happiness in the world today and always 💕
</div>

<!-- PHOTO SECTION -->

<div class="gallery">

<div class="card">
<img src="photo1.jpeg">
<div class="quote">You make my world brighter 💖</div>
</div>

<div class="card">
<img src="photo2.jpeg">
<div class="quote">Your smile is my happiness ✨</div>
</div>

<div class="card">
<img src="photo3.jpeg">
<div class="quote">Forever my favorite person 💕</div>
</div>

<div class="card">
<img src="photo4.jpeg">
<div class="quote">Life is beautiful with you ❤️</div>
</div>

</div>

<!-- LOVE LETTER -->

<div class="letter" id="letter"></div>

<a href="video.html">
<button>🎥 Click for a Surprise Video</button>
</a>

<script>

/* typing love letter */

let text="Happy Birthday, my love❤️😚Finding love at such a young age felt like discovering a little piece of magic in this world. And that magic was you. Loving you has been the most beautiful and meaningful part of my life, and it will always remain the best part of my journey.🥹You came into my life and turned ordinary moments into the most special memories. Your smile, your care, and the way you love me make my world brighter every single day. On your birthday, I just want you to know how grateful I am to have you. No matter where life takes us, loving you was, is, and always will be the most beautiful chapter of my life🫶🪄Happy Birthday, my forever favorite person💖✨ I LOVE YOUUU SOOOOOOOOOOOO MUCH CUTIEEEE";

let i=0;

function typing(){

if(i<text.length){

document.getElementById("letter").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,40);

}

}

typing();

/* floating hearts */

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),7000);

}

setInterval(createHeart,400);

</script>

</body>

</html>
